{% load static %}<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ bar.name }} — Menu indisponible</title>
  <meta name="theme-color" content="#f6efe2">
  <link rel="apple-touch-icon" href="{% static 'icons/buub.jpeg' %}">
  <link rel="icon" href="{% static 'icons/buub.jpeg' %}">
  <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
  <script src="{% static 'pwa.js' %}" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, Arial, sans-serif; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(180deg, #fbf6ec, #efe4d2); color: #2c2018; padding: 24px; }
    .card { text-align: center; max-width: 380px; }
    .ic { width: 92px; height: 92px; margin: 0 auto 22px; border-radius: 50%; display: grid; place-items: center;
      background: rgba(199,95,28,.12); color: #c75f1c; font-size: 3rem; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; letter-spacing: -.01em; }
    p { color: #5b4d40; line-height: 1.5; }
    .b { font-weight: 800; }
  </style>
</head>
<body>
  <div class="card">
    <div class="ic">⏳</div>
    <h1>Menu temporairement indisponible</h1>
    <p><span class="b">{{ bar.name }}</span> n'est pas accessible pour le moment.<br>Merci de revenir plus tard ou de commander auprès d'un serveur.</p>
  </div>
</body>
</html>
